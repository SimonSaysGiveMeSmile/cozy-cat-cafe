<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Cat Run</title>
<meta name="description" content="Cat Run — a minimal ink-on-paper endless runner. Swap your runner between cats and memes mid-jump as day inverts into night. Built for phones and desktop." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F4EEE3; --ink:#241F1A; --honey:#C98A2E; --rose:#C26B62;
    --soft:rgba(36,31,26,.52); --hair:rgba(36,31,26,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    min-height:100%;
    background:
      repeating-linear-gradient(0deg, transparent 0 23px, rgba(36,31,26,.025) 23px 24px),
      var(--paper);
    color:var(--ink);
    font-family:"DM Mono", ui-monospace, SFMono-Regular, monospace;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:26px 16px 30px; overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  header{text-align:center; line-height:1}
  .kicker{
    margin:0 0 8px; font-size:11px; font-weight:500; letter-spacing:.42em;
    text-transform:uppercase; color:var(--soft); padding-left:.42em;
  }
  h1{
    margin:0; font-family:"Bricolage Grotesque", system-ui, sans-serif; font-weight:800;
    font-size:clamp(26px,5.4vw,42px); letter-spacing:-.02em; color:var(--ink);
  }
  .rule{width:64px; height:2px; background:var(--ink); margin:12px auto 0; opacity:.85}
  .stage{position:relative; width:min(920px,100%);}
  canvas#game{
    width:100%; height:auto; display:block; border-radius:8px;
    background:var(--paper);
    border:1.5px solid var(--ink);
    box-shadow:7px 7px 0 rgba(36,31,26,.13);
    touch-action:none; outline:none;
  }
  canvas#game:focus-visible{box-shadow:7px 7px 0 rgba(36,31,26,.13), 0 0 0 3px var(--honey)}
  .hint{
    margin:0; font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--soft); text-align:center; transition:opacity .4s ease; min-height:16px;
  }
  .hint b{color:var(--ink); font-weight:500}
  .bar{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
  button.ui{
    font-family:"DM Mono", monospace; font-weight:500; font-size:12px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--ink); background:transparent; border:1.5px solid var(--ink);
    border-radius:7px; padding:9px 16px; cursor:pointer;
    transition:background .14s ease, color .14s ease, transform .05s ease;
    display:inline-flex; align-items:center; gap:8px;
  }
  button.ui:hover{background:var(--ink); color:var(--paper)}
  button.ui:active{transform:translateY(1px)}
  button.ui:focus-visible{outline:none; box-shadow:0 0 0 3px var(--honey)}
  /* primary touch controls — a bar BELOW the play area, big thumb targets */
  .pad{
    display:flex; gap:12px; width:min(920px,100%); margin-top:2px;
    touch-action:none;
  }
  .cbtn{
    flex:1; min-height:74px; border-radius:16px; cursor:pointer;
    border:1.5px solid var(--ink); background:#fff; color:var(--ink);
    font-family:"DM Mono",monospace; font-weight:500; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; -webkit-tap-highlight-color:transparent; user-select:none;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    transition:background .1s ease, color .1s ease, transform .05s ease;
  }
  .cbtn .em{font-size:26px; line-height:1; font-weight:400}
  .cbtn.jump{flex:1.5; background:var(--ink); color:var(--paper)}      /* jump is the hero action */
  .cbtn.jump .em{transform:translateY(-1px)}
  .cbtn:active{transform:translateY(2px)}
  .cbtn.duck.held,.cbtn:active{background:var(--ink); color:var(--paper)}
  .cbtn:focus-visible{outline:none; box-shadow:0 0 0 3px var(--honey)}
  .sr{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap}
  footer{font-size:11px; letter-spacing:.06em; color:var(--soft); text-align:center; margin-top:2px}
  footer a{color:var(--ink); text-underline-offset:3px}
</style>
</head>
<body>
  <header>
    <p class="kicker">Endless Runner · Swap Mid-Jump</p>
    <h1>Cat Run</h1>
    <div class="rule"></div>
  </header>
  <div class="stage">
    <canvas id="game" width="900" height="380" tabindex="0" role="img" aria-label="Cat Run — a minimal endless runner. Tap or press space to jump, down to duck, C to swap your character."></canvas>
  </div>
  <p class="hint" id="hint"><b>Tap JUMP</b> or Space · hold <b>DUCK</b> · <b>SWAP</b> mid-run</p>
  <!-- Primary controls live OUTSIDE the play area — big thumb targets -->
  <div class="pad" id="pad">
    <button class="cbtn duck" id="tduck"><span class="em">▼</span><span class="lbl">Duck</span></button>
    <button class="cbtn swap" id="tswap"><span class="em">⇄</span><span class="lbl">Swap</span></button>
    <button class="cbtn jump" id="tjump"><span class="em">▲</span><span class="lbl">Jump</span></button>
  </div>
  <div class="bar">
    <button class="ui" id="bmute" aria-label="Toggle sound">Sound</button>
    <button class="ui" id="bpause" aria-label="Pause">Pause</button>
  </div>
  <div class="sr" id="sr" aria-live="polite"></div>
  <footer>Built by <a href="https://github.com/SimonSaysGiveMeSmile" target="_blank" rel="noopener">SimonSaysGiveMeSmile</a> · swap mid-run, find your vibe</footer>

<script>
(function(){
"use strict";
var cv=document.getElementById('game'), ctx=cv.getContext('2d');
var W=900,H=380, GY=300; // logical (H/GY adapt to a taller, near-square box in portrait)
var DPR=Math.min(2, window.devicePixelRatio||1);
function dims(){
  var portrait = window.innerHeight > window.innerWidth;
  W = 900;                       // keep the horizontal track constant → same difficulty
  H = portrait ? 820 : 380;      // phones in portrait get a tall, near-square viewport
  GY = H - 80;                   // ground stays 80px off the bottom (=300 when H=380)
}
function size(){ dims(); DPR=Math.min(2, window.devicePixelRatio||1); cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
size();
window.addEventListener('resize', size);
var DISP='"Bricolage Grotesque", system-ui, -apple-system, sans-serif';
var MONO='"DM Mono", ui-monospace, monospace';
var EMO='"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif'; // color-emoji safe stack

// ---------- palette (ink-on-paper, inverts day -> night) ----------
var PAPER=[244,238,227], INK=[36,31,26];
var HONEY='#C98A2E', ROSE='#C26B62';
var C={cocoa:'#241F1A',ink:'#241F1A',honey:HONEY,milk:ROSE,matcha:HONEY,rose:ROSE,soft:'#8A817A',plum:'#241F1A'};
function lerp(a,b,t){return a+(b-a)*t;}
function mix(c1,c2,t){return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];}
function rgb(c){return 'rgb('+c[0]+','+c[1]+','+c[2]+')';}
var nSmooth=0; // smoothed night value used for color inversion
function fieldRGB(){ var c=mix(PAPER,INK,nSmooth); return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }
function lineCol(a){ var c=mix(INK,PAPER,nSmooth); return 'rgba('+c[0]+','+c[1]+','+c[2]+','+(a===undefined?1:a)+')'; }

var RMq=matchMedia('(prefers-reduced-motion: reduce)'); var RM=RMq.matches;
RMq.addEventListener && RMq.addEventListener('change',function(e){RM=e.matches;});

// touch vs keyboard — so on-screen prompts never tell a phone to "press SPACE"
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints||0)>0;
function startHint(){ return isTouch ? 'TAP TO START' : 'PRESS SPACE TO START'; }
function retryHint(){ return isTouch ? 'TAP to retry  ·  SWAP changes your cat' : 'SPACE retry   ·   R reshuffle'; }
function resumeHint(){ return isTouch ? 'TAP PAUSE TO RESUME' : 'PRESS P TO RESUME'; }

// ---------- storage (safe) ----------
function lget(k,d){ try{var v=localStorage.getItem(k); return v===null?d:v;}catch(e){return d;} }
function lset(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

// ---------- roster ----------
var ROSTER=[
  {e:'😻',n:'Heart-Eyes',v:'café darling · 💕 trail',t:{trail:'💕'}},
  {e:'😺',n:'Barista',v:'peppy & springy',t:{spring:1.16,trail:'☕'}},
  {e:'😸',n:'Giggle',v:'floaty hang-time',t:{hang:0.55}},
  {e:'😼',n:'Smug',v:'heavy, satisfying thunk',t:{weight:1.5,puff:2}},
  {e:'🙀',n:'Spooked',v:'maximum screen-shake',t:{shake:9}},
  {e:'😹',n:'Cackle',v:'😂 on every near-miss',t:{nearEmote:'😂'}},
  {e:'🐈',n:'Loaf',v:'low hitbox · ducks great',t:{duck:true,low:true}},
  {e:'🗿',n:'Moai',v:'deadpan. unbothered.',t:{deadpan:true}},
  {e:'🐸',n:'Pepe-ish',v:'double micro-hop',t:{hop:true}},
  {e:'😎',n:'Cool Bean',v:'✨ trail · vibe x1.25',t:{trail:'✨',vibe:1.25}},
  {e:'🤓',n:'Nerd',v:'shows live combo',t:{combo:true}},
  {e:'💀',n:'Skull',v:'this is fine · night cap',t:{night:true}}
];
var ci=Math.max(0,Math.min(ROSTER.length-1, parseInt(lget('cozyCatCafe.char','0'),10)||0));
function CH(){return ROSTER[ci];}

// ---------- audio (synth, opt-in) ----------
var muted = lget('cozyCatCafe.muted','1')==='1';
var actx=null;
function aReady(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
function beep(freq,dur,type,vol){ if(muted||!actx) return; try{
  var o=actx.createOscillator(), g=actx.createGain(); o.type=type||'sine'; o.frequency.value=freq;
  g.gain.value=0.0001; o.connect(g); g.connect(actx.destination); var t=actx.currentTime;
  g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
  o.start(t); o.stop(t+(dur||0.12)+0.02);
}catch(e){} }
function arp(base){ if(muted) return; [0,4,7,12].forEach(function(s,i){ setTimeout(function(){beep(base*Math.pow(2,s/12),0.12,'triangle',0.09);}, i*70); }); }

// ---------- state ----------
var S={phase:'start',dist:0,speed:6,score:0,bonus:0,hi:parseInt(lget('cozyCatCafe.hi','0'),10)||0,
  combo:0,vibe:0,tier:0,shake:0,slow:1, t:0, night:0, flash:0, banner:null};
var parts=[], obs=[], floaters=[], chip=null;
var p={x:150,y:0,vy:0,grounded:true,duck:false,sx:1,sy:1,coyote:0,buffer:0,spin:0};
var startPreview=ci;

var TIERS=[
  {name:'COZY',mult:1.0,warm:0},
  {name:'TOASTY',mult:1.4,warm:0.35},
  {name:'GOLDEN',mult:1.8,warm:0.7},
  {name:'PURR',mult:2.4,warm:1.0}
];

function curScore(){return Math.floor(S.dist)+Math.floor(S.bonus);}

// ---------- particles / floaters ----------
function puff(x,y,n,kind){ for(var i=0;i<n;i++){ parts.push({x:x+(Math.random()*20-10),y:y,vx:(Math.random()*2-1)*1.4,vy:kind==='steam'?-(Math.random()*1.6+0.6):-(Math.random()*1+0.3),life:30+Math.random()*15,max:45,kind:kind||'dust'}); } }
function floater(x,y,txt,col){ floaters.push({x:x,y:y,txt:txt,col:col||C.ink,life:50,vy:-0.7}); }

// ---------- swap (signature) ----------
function nameChip(){ var c=CH(); chip={t:74,e:c.e,n:c.n,v:c.v,y:GY,ty:GY-66}; }
function swap(dir){
  ci=((ci+dir)%ROSTER.length+ROSTER.length)%ROSTER.length;
  lset('cozyCatCafe.char',ci);
  var sx=p.x, sy=GY+p.y-26;
  puff(sx,sy,12,'steam');
  p.sx=1.32; p.sy=0.7;          // squash-drop on the new char
  nameChip();
  beep(520,0.09,'square',0.08); beep(720,0.07,'square',0.05);
  say(CH().n+': '+CH().v);
}
function reshuffle(){ var n=ci; while(n===ci){ n=Math.floor(Math.random()*ROSTER.length); } ci=n; lset('cozyCatCafe.char',ci); start(); }

function say(txt){ var sr=document.getElementById('sr'); if(sr) sr.textContent=txt; }

// ---------- game flow ----------
function start(){
  S.phase='play'; S.dist=0; S.speed=6; S.score=0; S.bonus=0; S.combo=0; S.vibe=0; S.tier=0; S.shake=0; S.slow=1; S.night=0; S.flash=0; S.banner=null;
  parts.length=0; obs.length=0; floaters.length=0; chip=null;
  p.y=0; p.vy=0; p.grounded=true; p.duck=false; p.sx=1; p.sy=1; p.coyote=0; p.buffer=0; p.spin=0;
  spawnGap=70; nextSpawn=80;
  hint(0.4);
}
function gameOver(){
  if(S.phase!=='play') return;
  S.phase='over'; S.slow=RM?1:0.35; p.spin=RM?0:1; S.spinT=0;
  beep(180,0.4,'sine',0.12); setTimeout(function(){beep(120,0.5,'sine',0.1);},120);
  var sc=curScore(); var nb=sc>S.hi; if(nb){ S.hi=sc; lset('cozyCatCafe.hi',S.hi); }
  S.finalScore=sc; S.newBest=nb;
  say('Game over. Score '+sc+'. '+(nb?'New best!':'Best '+S.hi)+'. Press space to retry.');
  hint(1);
}
function hint(o){ var h=document.getElementById('hint'); if(h) h.style.opacity=o; }

// ---------- spawner (fair) ----------
var spawnGap=70, nextSpawn=80, lastKind='ground';
var GROUND=[{e:'🧶',r:18},{e:'🥛',r:16},{e:'🥒',r:15,gag:true},{e:'☕',r:17}];
var FLY=[{e:'🥐',r:16},{e:'🦋',r:15}];
function airTime(){ return 2*15/0.9; } // ~33 frames
function spawn(){
  // min clearable gap from speed + jump arc
  var reach = airTime()*S.speed;
  var minGap = Math.max(120, reach*0.55);
  var flyOK = S.dist>=300;
  var roll = Math.random();
  if(roll<0.16 && S.dist>=140){ // fish bonus — grab by running into it
    obs.push({x:W+30,kind:'fish',e:'🐟',r:15,y:GY-40,grabbed:false,passed:false});
  } else if(flyOK && roll<0.42){
    var f=FLY[Math.floor(Math.random()*FLY.length)];
    obs.push({x:W+30,kind:'fly',e:f.e,r:f.r,y:GY-52,passed:false}); // head height — duck to clear
    lastKind='fly';
  } else if(S.night>0.5 && roll<0.5){
    obs.push({x:W+30,kind:'fly',e:'🏮',r:16,y:GY-54,sway:Math.random()*6,passed:false});
    lastKind='fly';
  } else {
    var g=GROUND[Math.floor(Math.random()*GROUND.length)];
    obs.push({x:W+30,kind:'ground',e:g.e,r:g.r,y:GY-g.r,gag:g.gag,passed:false});
    lastKind='ground';
  }
  // schedule next: never require jump->duck whiplash too tight
  var base = Math.max(minGap, 360 - S.speed*14);
  nextSpawn = base + Math.random()*120;
  spawnDist=0;
}
var spawnDist=0;

// ---------- input ----------
function doJump(){
  aReady();
  if(S.phase==='start'){ start(); return; }
  if(S.phase==='over'){ start(); return; }
  if(S.phase==='pause'){ return; }
  p.buffer=6;
}
function tryJump(){
  if((p.grounded||p.coyote>0) && p.buffer>0){
    var c=CH().t;
    p.vy=-15*(c.spring||1)*(c.hang?1.04:1);
    p.grounded=false; p.coyote=0; p.buffer=0; p.sx=0.82; p.sy=1.22;
    if(c.hop) p.hop=8;
    beep(520,0.08,'sine',0.07);
  }
}
function setDuck(on){ if(S.phase==='play') p.duck=on; }
function pause(){ if(S.phase==='play'){S.phase='pause'; hint(1); say('Paused');} else if(S.phase==='pause'){S.phase='play'; hint(0.4); say('Resumed');} }
function toggleMute(){ muted=!muted; lset('cozyCatCafe.muted',muted?'1':'0'); document.getElementById('bmute').textContent=(muted?'Muted':'Sound'); if(!muted) aReady(); }

window.addEventListener('keydown',function(e){
  var k=e.key;
  if(k===' '||k==='ArrowUp'||k==='w'||k==='W'){ e.preventDefault();
    if(S.phase==='start'||S.phase==='over'){ doJump(); } else { doJump(); }
  }
  else if(k==='ArrowDown'||k==='s'||k==='S'){ e.preventDefault(); setDuck(true); }
  else if(k==='c'||k==='C'){ swap(e.shiftKey?-1:1); if(S.phase==='start') startPreview=ci; }
  else if(k==='p'||k==='P'||k==='Escape'){ pause(); }
  else if(k==='m'||k==='M'){ toggleMute(); }
  else if(k==='Enter'){ if(S.phase==='start'||S.phase==='over') start(); }
});
window.addEventListener('keyup',function(e){
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){ setDuck(false); }
  if((e.key===' '||e.key==='ArrowUp') && !p.grounded && p.vy<0){ p.vy*=0.5; } // variable height
});

// pointer / touch — controls live in the .pad bar BELOW the play area
function bindHold(el,onDown,onUp){
  el.addEventListener('pointerdown',function(e){e.preventDefault(); aReady(); el.setPointerCapture&&el.setPointerCapture(e.pointerId); onDown();});
  el.addEventListener('pointerup',function(e){e.preventDefault(); onUp&&onUp();});
  el.addEventListener('pointercancel',function(e){onUp&&onUp();});
  el.addEventListener('pointerleave',function(e){onUp&&onUp();});
}
bindHold(document.getElementById('tjump'),function(){doJump();});
var duckBtn=document.getElementById('tduck');
bindHold(duckBtn,function(){setDuck(true); duckBtn.classList.add('held');},function(){setDuck(false); duckBtn.classList.remove('held');});
document.getElementById('tswap').addEventListener('pointerdown',function(e){e.preventDefault(); aReady(); swap(1); if(S.phase==='start') startPreview=ci;});

// canvas tap anywhere = jump / start / retry (no controls live on the display itself)
cv.addEventListener('pointerdown',function(e){ e.preventDefault(); aReady(); cv.focus(); doJump(); });

document.getElementById('bmute').addEventListener('click',function(){ toggleMute(); cv.focus(); });
document.getElementById('bpause').addEventListener('click',function(){ pause(); cv.focus(); });
document.getElementById('bmute').textContent=(muted?'Muted':'Sound');

document.addEventListener('visibilitychange',function(){ if(document.hidden && S.phase==='play'){ S.phase='pause'; } });

// ---------- update ----------
function update(dt){
  S.t+=dt;
  // speed + distance
  S.speed = Math.min(14.5, 6 + S.dist*0.0034) + (TIERS[S.tier].mult-1)*1.1;
  S.speed = Math.min(15.8, S.speed);
  var prevDist=S.dist;
  S.dist += S.speed*0.1*dt;
  S.night = Math.min(1, S.dist/1300);

  // physics
  p.coyote = p.grounded?6:Math.max(0,p.coyote-dt);
  p.buffer = Math.max(0,p.buffer-dt);
  tryJump();
  if(!p.grounded){
    var c=CH().t; var g=0.9;
    if(c.hang && p.vy>-2 && p.vy<2) g=0.9*0.62; // floaty apex
    p.vy += g*dt;
    if(p.hop>0){ p.hop-=dt; if(p.hop<=0 && p.vy<0){ p.vy*=0.82; } }
    p.y += p.vy*dt;
    if(p.y>=0){ land(); }
  }
  // squash ease back
  p.sx += (1-p.sx)*0.2*dt; p.sy += (1-p.sy)*0.2*dt;
  S.shake *= Math.pow(0.85,dt);

  // spawner
  spawnDist += S.speed*dt;
  nextSpawn -= S.speed*dt;
  if(nextSpawn<=0){ spawn(); }

  // obstacles
  var px=p.x, py=GY+p.y, pr=(p.duck?13:19)*(CH().t.low?0.8:1);
  var pcy=py-22*(p.duck?0.6:1);
  for(var i=obs.length-1;i>=0;i--){
    var o=obs[i]; o.x -= S.speed*dt;
    if(o.sway!==undefined) o.oy=Math.sin(S.t*0.05+o.sway)*5;
    // collide
    var oy=o.y+(o.oy||0);
    var dx=o.x-px, dy=oy-pcy, rr=(o.r+pr);
    var hit = (dx*dx+dy*dy) < rr*rr;
    if(o.kind==='fish'){
      if(hit && !o.grabbed){ o.grabbed=true; S.bonus+=Math.round(25*TIERS[S.tier].mult); S.combo++; S.vibe=Math.min(1,S.vibe+0.13); floater(px,py-50,'+25',C.honey); beep(880,0.1,'triangle',0.08); }
    } else if(o.kind==='fly'){
      if(hit && !p.duck){ gameOver(); }
    } else {
      if(hit){ gameOver(); }
      if(o.gag && !o.gagged && o.x<px+10 && o.x>px-40){ o.gagged=true; floater(o.x,oy-30,'🙀',C.ink); }
    }
    // near-miss / passed
    if(!o.passed && o.x<px-10){ o.passed=true;
      if(o.kind!=='fish'){ S.bonus+=Math.round(10*TIERS[S.tier].mult); S.combo++; S.vibe=Math.min(1,S.vibe+0.075*(CH().t.vibe||1));
        var em=CH().t.nearEmote; floater(px+24,py-46,em?em:'+10',em?C.ink:C.rose);
        beep(660,0.05,'sine',0.04);
      }
    }
    if(o.x<-40) obs.splice(i,1);
  }

  // vibe drain + tier
  S.vibe = Math.max(0, S.vibe - 0.0006*dt);
  var nt=Math.min(3,Math.floor(S.vibe*3.999));
  if(nt>S.tier){ S.tier=nt; tierUp(); }
  else if(nt<S.tier){ S.tier=nt; }

  // milestones
  if(Math.floor(prevDist/100)!==Math.floor(S.dist/100)){ beep(784,0.08,'triangle',0.06); floater(p.x,GY+p.y-60,Math.floor(S.dist/100)*100+'m',C.honey); if(Math.floor(S.dist)%500<5) say(Math.floor(S.dist)+' metres!'); }

  // trail
  var tr=CH().t.trail;
  if(tr && !p.grounded && Math.random()<0.4*(1-S.speed/16)+0.06){ floaters.push({x:p.x-14,y:GY+p.y-26,txt:tr,col:'',life:26,vy:0.2,scale:0.7}); }

  // particles
  for(var j=parts.length-1;j>=0;j--){ var q=parts[j]; q.x+=q.vx*dt; q.y+=q.vy*dt; if(q.kind==='dust') q.vy+=0.15*dt; q.life-=dt; if(q.life<=0) parts.splice(j,1); }
  for(var f=floaters.length-1;f>=0;f--){ var fl=floaters[f]; fl.y+=fl.vy*dt; fl.life-=dt; if(fl.life<=0) floaters.splice(f,1); }
  if(chip){ chip.y += (chip.ty-chip.y)*0.18*dt; chip.t-=dt; if(chip.t<=0) chip=null; }
  if(S.flash>0) S.flash=Math.max(0,S.flash-0.03*dt);
  if(S.banner){ S.banner.t-=dt; if(S.banner.t<=0) S.banner=null; }
}
function land(){
  var c=CH().t; p.y=0; p.vy=0; p.grounded=true; p.coyote=6; p.hop=0;
  puff(p.x-10,GY-2,4+(c.puff?c.puff*4:2));
  p.sx=1.24; p.sy=0.78;
  S.shake = RM?0:Math.min(10,(c.shake||4)*(c.weight||1));
  beep(c.weight?150:300,0.07,'sine',0.06);
}
function tierUp(){
  var T=TIERS[S.tier]; S.flash=RM?0.2:0.7;
  S.banner={txt:(T.name==='PURR'?'PURR STREAK':T.name), t:60};
  arp(T.name==='PURR'?660:440); say(T.name+(T.name==='PURR'?' streak!':' tier'));
}

// ---------- draw helpers ----------
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

// minimal ink silhouettes for obstacles (replaces colorful emoji)
function drawObstacle(o){
  var x=o.x, y=o.y+(o.oy||0), r=o.r;
  ctx.save(); ctx.translate(x,y);
  if(o.kind==='fish'){ // bonus: accent outline so it reads as reward
    ctx.strokeStyle=HONEY; ctx.lineWidth=2; ctx.lineJoin='round';
    ctx.beginPath(); ctx.ellipse(0,0,r,r*0.62,0,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.78,0); ctx.lineTo(r*1.5,-r*0.55); ctx.lineTo(r*1.5,r*0.55); ctx.closePath(); ctx.stroke();
    ctx.fillStyle=HONEY; ctx.beginPath(); ctx.arc(-r*0.5,-r*0.12,1.6,0,7); ctx.fill();
    ctx.restore(); return;
  }
  ctx.fillStyle=lineCol(1); ctx.strokeStyle=lineCol(1); ctx.lineJoin='round';
  var e=o.e;
  if(e==='🧶'){ // yarn ball
    ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
    ctx.strokeStyle=fieldRGB(); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(-r*0.2,-r*0.1,r*0.9,-0.9,1.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(r*0.25,r*0.15,r*0.8,2.1,4.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*0.7,-r*0.35); ctx.lineTo(r*0.6,r*0.5); ctx.stroke();
  } else if(e==='☕'){ // coffee cup
    ctx.beginPath(); ctx.moveTo(-r*0.78,-r*0.45); ctx.lineTo(r*0.78,-r*0.45); ctx.lineTo(r*0.58,r*0.72); ctx.lineTo(-r*0.58,r*0.72); ctx.closePath(); ctx.fill();
    ctx.lineWidth=2.4; ctx.beginPath(); ctx.arc(r*0.9,r*0.02,r*0.34,-1.1,1.1); ctx.stroke();
    ctx.strokeStyle=lineCol(0.55); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-r*0.18,-r*0.72); ctx.quadraticCurveTo(r*0.12,-r*1.0,-r*0.1,-r*1.3); ctx.stroke();
  } else if(e==='🥛'){ // milk carton (gable top)
    ctx.beginPath(); ctx.rect(-r*0.58,-r*0.15,r*1.16,r*1.05); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-r*0.58,-r*0.15); ctx.lineTo(0,-r*0.9); ctx.lineTo(r*0.58,-r*0.15); ctx.closePath(); ctx.fill();
    ctx.fillStyle=fieldRGB(); ctx.fillRect(-r*0.36,r*0.22,r*0.72,r*0.28);
  } else if(e==='🥒'){ // cucumber gag
    ctx.save(); ctx.rotate(-0.5);
    ctx.beginPath(); ctx.ellipse(0,0,r*0.5,r*1.08,0,0,7); ctx.fill();
    ctx.fillStyle=fieldRGB();
    for(var s=0;s<3;s++){ ctx.beginPath(); ctx.arc(0,-r*0.45+s*r*0.45,1.3,0,7); ctx.fill(); }
    ctx.restore();
  } else if(e==='🥐'){ // croissant crescent
    ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
    ctx.fillStyle=fieldRGB(); ctx.beginPath(); ctx.arc(r*0.62,0,r*0.92,0,7); ctx.fill();
  } else if(e==='🦋'){ // moth / bird silhouette (flying)
    ctx.beginPath(); ctx.ellipse(0,0,r*0.22,r*0.6,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-r*0.62,-r*0.08,r*0.62,r*0.34,-0.5,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(r*0.62,-r*0.08,r*0.62,r*0.34,0.5,0,7); ctx.fill();
  } else if(e==='🏮'){ // lantern
    ctx.beginPath(); ctx.ellipse(0,0,r*0.7,r*0.96,0,0,7); ctx.fill();
    ctx.fillRect(-r*0.4,-r*1.08,r*0.8,r*0.2);
    ctx.fillRect(-r*0.4,r*0.86,r*0.8,r*0.18);
    ctx.strokeStyle=lineCol(1); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(0,r*1.04); ctx.lineTo(0,r*1.36); ctx.stroke();
    ctx.strokeStyle=fieldRGB(); ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(0,-r*0.86); ctx.lineTo(0,r*0.86); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
  }
  ctx.restore();
}

// ---------- draw ----------
function draw(){
  // smooth night for color inversion
  nSmooth += (S.night - nSmooth)*0.05;

  // flat field (paper -> ink)
  ctx.fillStyle=fieldRGB(); ctx.fillRect(0,0,W,H);

  ctx.save();
  if(S.shake>0.3 && !RM){ ctx.translate((Math.random()*2-1)*S.shake,(Math.random()*2-1)*S.shake); }

  // sun -> moon (thin ink ring by day, crescent by night)
  var n=S.night, sunX=W-118, sunY=lerp(72,118,n);
  ctx.strokeStyle=lineCol(0.55); ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(sunX,sunY,20,0,7); ctx.stroke();
  if(n<0.45){ // day rays
    ctx.strokeStyle=lineCol(0.4*(1-n/0.45)); ctx.lineWidth=2;
    for(var ray=0;ray<8;ray++){ var a=ray/8*Math.PI*2; ctx.beginPath(); ctx.moveTo(sunX+Math.cos(a)*27,sunY+Math.sin(a)*27); ctx.lineTo(sunX+Math.cos(a)*33,sunY+Math.sin(a)*33); ctx.stroke(); }
  }
  if(n>0.5){ // crescent moon fills in
    var ma=Math.min(1,(n-0.5)/0.35); ctx.globalAlpha=ma;
    ctx.fillStyle=lineCol(1); ctx.beginPath(); ctx.arc(sunX,sunY,19,0,7); ctx.fill();
    ctx.fillStyle=fieldRGB(); ctx.beginPath(); ctx.arc(sunX+9,sunY-5,18,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  // stars at night
  if(n>0.4){ ctx.globalAlpha=(n-0.4)/0.6*0.8; ctx.fillStyle=lineCol(1);
    for(var st=0;st<16;st++){ var stx=(st*97+30)%W, sty=(st*53)%Math.max(140,GY-160)+20; ctx.fillRect(stx,sty,2,2); }
    ctx.globalAlpha=1;
  }

  // drifting steam clouds (parallax)
  ctx.strokeStyle=lineCol(0.16); ctx.lineWidth=1.5;
  for(var cl=0;cl<4;cl++){
    var clx=((cl*260 - (S.dist*0.18))%(W+220)+W+220)%(W+220)-110;
    var cly=50+(cl%3)*Math.max(26, GY*0.18);
    ctx.beginPath();
    ctx.arc(clx,cly,12,Math.PI*0.5,Math.PI*1.5);
    ctx.arc(clx+16,cly-8,15,Math.PI*0.8,Math.PI*1.9);
    ctx.arc(clx+34,cly,12,Math.PI*1.5,Math.PI*0.5);
    ctx.stroke();
  }

  // distant rooftops (thin outline parallax)
  ctx.strokeStyle=lineCol(0.14); ctx.lineWidth=1.5; ctx.beginPath();
  var rofX=-(S.dist*0.12)%140, rfB=GY-68, rfP=GY-94, rfP2=GY-90;
  ctx.moveTo(rofX-20,rfB);
  for(var rx=rofX-20;rx<W+80;rx+=140){ ctx.lineTo(rx+34,rfP); ctx.lineTo(rx+70,rfB); ctx.lineTo(rx+76,rfB); ctx.lineTo(rx+110,rfP2); ctx.lineTo(rx+140,rfB); }
  ctx.stroke();

  // ground: one crisp line + scrolling marks (dino-style)
  ctx.strokeStyle=lineCol(1); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();
  // pebbles & tufts riding the line
  ctx.lineWidth=2;
  for(var gm=0;gm<26;gm++){
    var seed=(gm*131)%420;
    var gx=((seed - (S.dist*1)%420)%(W+60)+(W+60))%(W+60)-30;
    var kind=gm%5;
    if(kind===0){ ctx.beginPath(); ctx.moveTo(gx,GY+6); ctx.lineTo(gx+10,GY+6); ctx.stroke(); }       // dash
    else if(kind===1){ ctx.fillStyle=lineCol(1); ctx.fillRect(gx,GY+5,3,3); }                          // pebble
    else if(kind===2){ ctx.beginPath(); ctx.moveTo(gx,GY); ctx.lineTo(gx-2,GY-6); ctx.moveTo(gx,GY); ctx.lineTo(gx+3,GY-7); ctx.stroke(); } // tuft
  }

  // PURR golden wash (accent, subtle)
  if(TIERS[S.tier].warm>0.9){ ctx.fillStyle='rgba(201,138,46,'+(0.07+0.04*Math.sin(S.t*0.1))+')'; ctx.fillRect(0,0,W,H); }
  if(S.flash>0){ ctx.fillStyle='rgba(201,138,46,'+(S.flash*0.22)+')'; ctx.fillRect(0,0,W,H); }

  // particles (under)
  for(var i=0;i<parts.length;i++){ var q=parts[i]; var a=q.life/q.max; ctx.globalAlpha=Math.max(0,a*0.8);
    ctx.fillStyle=lineCol(1);
    var r=q.kind==='steam'?(4-2*a):2.4; ctx.beginPath(); ctx.arc(q.x,q.y,r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  // obstacles (ink silhouettes)
  for(var o2=0;o2<obs.length;o2++){ var o=obs[o2]; if(o.grabbed) continue; drawObstacle(o); }

  // player shadow
  var py=GY+p.y, sh=Math.max(0.2,1-(-p.y)/120);
  ctx.fillStyle=lineCol(0.14*sh); ctx.beginPath(); ctx.ellipse(p.x,GY+7,24*p.sx*sh,6*sh,0,0,7); ctx.fill();

  // trail floaters behind
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(var fa=0;fa<floaters.length;fa++){ var fl=floaters[fa]; if(fl.scale){ ctx.globalAlpha=Math.max(0,fl.life/26); ctx.font=(18*fl.scale|0)+'px '+MONO; ctx.fillText(fl.txt,fl.x,fl.y); ctx.globalAlpha=1; } }

  // player (emoji — the single pop of colour)
  ctx.save(); ctx.translate(p.x,py-24);
  if(p.spin){ S.spinT=(S.spinT||0)+0.3; ctx.rotate(S.spinT); }
  ctx.scale(p.sx,p.sy*(p.duck?0.7:1)); ctx.translate(0,p.duck?8:0);
  ctx.font='44px '+EMO; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=lineCol(1); // solid ink so monochrome-fallback glyphs render crisp (color emoji ignore this)
  ctx.fillText(p.phase==='over'?'😵‍💫':CH().e, 0, 0);
  ctx.restore();
  // nerd combo
  if(CH().t.combo && S.combo>0 && S.phase==='play'){ ctx.font='500 15px '+MONO; ctx.fillStyle=lineCol(1); ctx.fillText('x'+S.combo, p.x, py-58); }

  // text floaters (front)
  ctx.textBaseline='middle';
  for(var ff=0;ff<floaters.length;ff++){ var f2=floaters[ff]; if(f2.scale) continue; ctx.globalAlpha=Math.max(0,f2.life/50); ctx.font='500 15px '+MONO; ctx.fillStyle=f2.col; ctx.fillText(f2.txt,f2.x,f2.y); }
  ctx.globalAlpha=1;

  // name chip (swap)
  if(chip){ var ca=chip.t<20?chip.t/20:1; ctx.globalAlpha=ca;
    ctx.font='500 14px '+MONO; var cw=Math.max(140, ctx.measureText(chip.n).width+96);
    ctx.fillStyle=fieldRGB(); roundRect(ctx,p.x-cw/2,chip.y-17,cw,36,9); ctx.fill();
    ctx.strokeStyle=lineCol(1); ctx.lineWidth=1.5; roundRect(ctx,p.x-cw/2,chip.y-17,cw,36,9); ctx.stroke();
    ctx.textAlign='left'; ctx.font='22px '+EMO; ctx.fillStyle=lineCol(1); ctx.fillText(chip.e,p.x-cw/2+13,chip.y+2);
    ctx.font='500 12px '+MONO; ctx.fillStyle=lineCol(1); ctx.fillText(chip.n.toUpperCase(),p.x-cw/2+46,chip.y-3);
    ctx.font='400 10px '+MONO; ctx.fillStyle=lineCol(0.6); ctx.fillText(chip.v,p.x-cw/2+46,chip.y+11);
    ctx.textAlign='center'; ctx.globalAlpha=1;
  }

  // banner (tier)
  if(S.banner){ var ba=S.banner.t<16?S.banner.t/16:1; ctx.globalAlpha=ba; ctx.font='800 30px '+DISP;
    ctx.fillStyle=HONEY; ctx.textAlign='center'; ctx.fillText(S.banner.txt,W/2,92+Math.sin(S.t*0.3)*2); ctx.globalAlpha=1; }

  ctx.restore(); // shake

  // HUD
  if(S.phase==='play'||S.phase==='pause'){
    ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.font='500 24px '+MONO; ctx.fillStyle=lineCol(1);
    ctx.fillText(pad(curScore()), W-18, 34);
    ctx.font='400 11px '+MONO; ctx.fillStyle=lineCol(0.5); ctx.fillText('HI '+pad(S.hi), W-18, 52);
    // tier + vibe bar
    ctx.textAlign='left'; ctx.font='500 12px '+MONO;
    ctx.fillStyle=TIERS[S.tier].warm>0.9?HONEY:lineCol(1);
    ctx.fillText(TIERS[S.tier].name+(S.combo>0?'  ×'+S.combo:''), 18, 30);
    ctx.strokeStyle=lineCol(0.4); ctx.lineWidth=1.5; roundRect(ctx,18,38,150,8,4); ctx.stroke();
    ctx.fillStyle=HONEY; var vw=146*Math.max(0,Math.min(1,S.vibe)); if(vw>0){ roundRect(ctx,20,40,vw,4,2); ctx.fill(); }
  }

  // screens
  if(S.phase==='start') drawStart();
  if(S.phase==='pause') drawPause();
  if(S.phase==='over') drawOver();
}
function pad(n){ n=''+n; while(n.length<5) n='0'+n; return n; }

function veil(){ ctx.fillStyle=lineCol(0.12); ctx.fillRect(0,0,W,H); }
function card(x,y,w,h){ ctx.fillStyle=fieldRGB(); roundRect(ctx,x,y,w,h,12); ctx.fill(); ctx.strokeStyle=lineCol(1); ctx.lineWidth=2; roundRect(ctx,x,y,w,h,12); ctx.stroke(); }

function drawStart(){
  veil(); ctx.save(); ctx.translate(0,(H-380)/2);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font='800 46px '+DISP; ctx.fillStyle=lineCol(1); ctx.fillText('Cat Run', W/2, 92);
  ctx.font='400 12px '+MONO; ctx.fillStyle=lineCol(0.6);
  ctx.fillText('SWAP YOUR RUNNER BETWEEN CATS & MEMES — MID-JUMP', W/2, 116);
  // preview character on a clean baseline
  ctx.strokeStyle=lineCol(0.5); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(W/2-70,224); ctx.lineTo(W/2+70,224); ctx.stroke();
  ctx.font='62px '+EMO; ctx.fillStyle=lineCol(1); ctx.textBaseline='alphabetic'; ctx.fillText(ROSTER[startPreview].e, W/2, 214+Math.sin(S.t*0.08)*4);
  ctx.font='500 17px '+MONO; ctx.fillStyle=lineCol(1); ctx.fillText('◀  '+ROSTER[startPreview].n.toUpperCase()+'  ▶', W/2, 250);
  ctx.font='400 11px '+MONO; ctx.fillStyle=lineCol(0.55); ctx.fillText(ROSTER[startPreview].v, W/2, 268);
  ctx.font='500 14px '+MONO; ctx.fillStyle=lineCol(1); ctx.fillText(startHint(), W/2, 304+Math.sin(S.t*0.2)*1.2);
  ctx.font='400 11px '+MONO; ctx.fillStyle=lineCol(0.5); ctx.fillText('⇄ swap  ·  best '+pad(S.hi), W/2, 324);
  ctx.restore();
}
function drawPause(){ veil(); ctx.save(); ctx.translate(0,(H-380)/2); ctx.textAlign='center'; ctx.fillStyle=lineCol(1); ctx.font='800 32px '+DISP; ctx.fillText('Paused', W/2,168); ctx.font='400 12px '+MONO; ctx.fillStyle=lineCol(0.6); ctx.fillText(resumeHint(), W/2,196); ctx.restore(); }
function drawOver(){
  veil(); ctx.save(); ctx.translate(0,(H-380)/2);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  var cw=340, cx=W/2-cw/2, cardY=64, chh=204;
  card(cx,cardY,cw,chh);
  ctx.fillStyle=lineCol(1); ctx.font='500 13px '+MONO; ctx.fillText('— GAME OVER —', W/2, cardY+34);
  ctx.font='52px '+EMO; ctx.fillText('😴', W/2, cardY+92);
  ctx.font='800 38px '+DISP; ctx.fillStyle=lineCol(1); ctx.fillText((S.finalScore||curScore())+'', W/2, cardY+138);
  ctx.font='400 11px '+MONO; ctx.fillStyle=lineCol(0.55); ctx.fillText('METRES', W/2, cardY+154);
  if(S.newBest){ ctx.fillStyle=HONEY; ctx.font='500 13px '+MONO; ctx.fillText('★ NEW BEST ★', W/2, cardY+176); }
  else { ctx.fillStyle=lineCol(0.6); ctx.font='400 12px '+MONO; ctx.fillText('BEST  '+pad(S.hi), W/2, cardY+176); }
  ctx.fillStyle=lineCol(0.7); ctx.font='400 11px '+MONO; ctx.fillText(retryHint(), W/2, cardY+196);
  ctx.restore();
}
// reshuffle key
window.addEventListener('keydown',function(e){ if((e.key==='r'||e.key==='R') && S.phase==='over'){ reshuffle(); } });

// ---------- loop ----------
// Frame-rate-independent stepping: advance the sim by REAL elapsed time, not a
// fixed 60Hz tick. This kills judder on high-refresh (120Hz ProMotion) displays
// where a fixed tick leaves half the frames with no motion. Sub-stepped at <=1
// unit (1/60s) so fast obstacles can never tunnel through the player.
var last=0, STEP=1000/60;
function advance(elapsed){
  if(elapsed>100) elapsed=100;           // clamp tab-refocus gaps
  var units=elapsed/STEP;                // elapsed expressed in 60fps units
  var n=0;
  if(S.phase==='play'){
    while(units>1e-6){ var d=Math.min(1,units); update(d); units-=d; n++; }
  } else if(S.phase==='over'){           // let particles / slow-mo settle
    var sl=units*S.slow;
    while(sl>1e-6){ var d2=Math.min(1,sl);
      for(var j=parts.length-1;j>=0;j--){ var q=parts[j]; q.x+=q.vx*d2; q.y+=q.vy*d2; if(q.kind==='dust')q.vy+=0.15*d2; q.life-=d2; if(q.life<=0)parts.splice(j,1); }
      sl-=d2; n++;
    }
    if(S.slow<1) S.slow=Math.min(1,S.slow+0.02*units);
  }
  return n;
}
function frame(ts){
  if(!last) last=ts; var elapsed=ts-last; last=ts;
  advance(elapsed);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// expose for testing/CI screenshotting (read-only helpers — no gameplay effect)
window.__cozy={S:S,start:start,swap:swap,jump:doJump,advance:advance,STEP:STEP,
  setChar:function(i){ci=i;lset('cozyCatCafe.char',i);},
  setNight:function(v){S.night=v;nSmooth=v;},
  roster:ROSTER,p:p,obs:obs,
  geom:function(){return {W:W,H:H,GY:GY};},   // ground/canvas geometry (adapts to portrait)
  ci:function(){return ci;},
  setHi:function(v){S.hi=v;lset('cozyCatCafe.hi',v);},
  duck:setDuck, pause:pause, lget:lget,
  isTouch:isTouch, hints:function(){return {start:startHint(),retry:retryHint(),resume:resumeHint()};}};
})();
</script>
